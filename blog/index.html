<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>技术博客 — M1NIWA</title>
<style>
  /* ===== Reset & Base ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  a { color: #3b82f6; text-decoration: none; transition: color 0.2s; }
  a:hover { color: #60a5fa; }

  /* ===== Navigation ===== */
  .nav {
    border-bottom: 1px solid #21262d;
    padding: 16px 0;
    position: sticky;
    top: 0;
    background: rgba(15, 17, 23, 0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 100;
  }
  .nav-inner {
    max-width: 840px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 14px;
    color: #8b949e;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .nav-back:hover { color: #3b82f6; }
  .nav-back .arrow { font-size: 16px; line-height: 1; }

  /* ===== Main Content ===== */
  .main {
    flex: 1;
    max-width: 840px;
    margin: 0 auto;
    padding: 48px 24px 32px;
    width: 100%;
  }

  /* ===== Header ===== */
  .page-header { margin-bottom: 48px; }
  .page-title {
    font-size: 36px;
    font-weight: 700;
    letter-spacing: -0.025em;
    color: #f0f6fc;
    margin-bottom: 8px;
  }
  .page-title .bracket { color: #3b82f6; font-weight: 600; }
  .page-subtitle {
    font-size: 15px;
    color: #8b949e;
    font-weight: 400;
    max-width: 560px;
  }

  /* ===== Blog List ===== */
  .blog-list {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .blog-item {
    display: grid;
    grid-template-columns: 110px 1fr;
    align-items: baseline;
    gap: 20px;
    padding: 14px 0;
    border-bottom: 1px solid #1a1d25;
    transition: background 0.2s;
  }
  .blog-item:hover { background: rgba(255,255,255,0.015); }
  .blog-date {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 13px;
    color: #484f58;
    white-space: nowrap;
    padding-top: 1px;
  }
  .blog-info { display: flex; flex-direction: column; gap: 5px; }
  .blog-title {
    font-size: 16px;
    font-weight: 600;
    color: #c9d1d9;
    transition: color 0.2s;
    cursor: pointer;
    letter-spacing: -0.01em;
    text-decoration: none;
  }
  .blog-title:hover { color: #3b82f6; }
  .blog-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .blog-tag {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    background: #1c2128;
    color: #8b949e;
    border: 1px solid #30363d;
    transition: all 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .blog-tag:hover {
    background: #1f2937;
    color: #3b82f6;
    border-color: #3b82f6;
  }

  /* ===== Filter Bar ===== */
  .filter-bar {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid #21262d;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 8px;
  }
  .filter-label {
    font-size: 13px;
    color: #484f58;
    font-weight: 500;
    margin-right: 4px;
  }
  .filter-tag {
    font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    padding: 4px 12px;
    border-radius: 6px;
    border: 1px solid #30363d;
    background: transparent;
    color: #8b949e;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .filter-tag:hover {
    border-color: #3b82f6;
    color: #c9d1d9;
  }
  .filter-tag.active {
    background: #1f2937;
    border-color: #3b82f6;
    color: #3b82f6;
  }
  .no-results {
    text-align: center;
    color: #484f58;
    font-size: 14px;
    padding: 48px 0;
    display: none;
  }

  /* ===== Footer ===== */
  .footer {
    border-top: 1px solid #21262d;
    padding: 20px 0;
    text-align: center;
    font-size: 13px;
    color: #484f58;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .blog-item { grid-template-columns: 1fr; gap: 4px; padding: 16px 0; }
    .blog-date { font-size: 12px; }
    .page-title { font-size: 26px; }
  }
</style>

<nav class="nav">

  <!-- Filter Bar -->
  <div class="filter-bar" id="filterBar">
    <span class="filter-label">筛选</span>

    <button class="filter-tag" data-tag="FastAPI">FastAPI</button>
    <button class="filter-tag" data-tag="Python">Python</button>

    <button class="filter-tag" data-tag="DevOps">DevOps</button>

</main>

<footer class="footer">&copy; 2026 M1NIWA</footer>

    { date: '2025-11-28', title: '第一次读论文：如何高效啃AI学术文献', tags: ['论文', '阅读方法', 'AI'], url: '/blog/blog-30.html' },

  ];

  // ===== DOM =====
  var blogList = document.getElementById('blogList');
  var noResults = document.getElementById('noResults');
  var filterTags = document.querySelectorAll('#filterBar .filter-tag');

  // ===== Filter State =====
  var activeTag = '全部';

  // ===== Render =====
  function render(filter) {
    var html = '';
    var count = 0;

    for (var i = 0; i < articles.length; i++) {
      var a = articles[i];
      if (filter !== '全部') {
        if (a.tags.indexOf(filter) === -1) continue;
      }
      count++;

      var tagHtml = '';
      for (var j = 0; j < a.tags.length; j++) {
        tagHtml += '<span class="blog-tag">' + a.tags[j] + '</span>';
      }

      html +=
        '<div class="blog-item">' +
          '<span class="blog-date">' + a.date + '</span>' +
          '<div class="blog-info">' +
            '<a href="' + a.url + '" class="blog-title">' + a.title + '</a>' +
            '<div class="blog-tags">' + tagHtml + '</div>' +
          '</div>' +
        '</div>';
    }

    blogList.innerHTML = html;
    noResults.style.display = count === 0 ? 'block' : 'none';
  }

  // ===== Filter Click =====
  for (var i = 0; i < filterTags.length; i++) {
    filterTags[i].addEventListener('click', function() {
      var tag = this.getAttribute('data-tag');

      // Update active class
      for (var k = 0; k < filterTags.length; k++) {
        filterTags[k].classList.remove('active');
      }
      this.classList.add('active');

      activeTag = tag;
      render(tag);
    });
  }

  // ===== Initial Render =====
  render('全部');
})();
</script>

</html>
